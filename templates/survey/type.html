{% extends "base.html" %}
{% block content %}
<div class="top-bar">
  <a class="back-btn" href="/survey/part1">חזרה</a>
  <div class="progress-container"><div class="progress-bar" style="width:12%"></div></div>
  <div class="step-text">בחירת מסלול</div>
</div>

<main class="container">
  <section class="card">
    <h1>בחירת מסלול מילוי</h1>

    <p>
      לפי התשובות שנתת בחלק הראשון, המערכת זיהתה אילו חלקים בשאלון רלוונטיים עבורך.
      עכשיו אפשר לבחור בין מסלול קצר לבין מסלול מורחב.
    </p>

    <form method="post" action="/survey/type" class="form">
      <div class="form-group">
        <label>איזה מסלול מתאים לך?</label>

        <div class="radio-group">
          <label>
            <input type="radio" name="survey_type" value="short" required checked>
            <strong>מסלול קצר</strong>
            <span>
              כולל את שאלות הליבה ואת החלקים המרכזיים שרלוונטיים אליך.
              מתאים למי שרוצה לתרום לדוח בלי להיכנס לעומק רב.
              במסלול זה יופיעו בערך {{ short_count }} חלקים.
            </span>
          </label>

          <label>
            <input type="radio" name="survey_type" value="full" required>
            <strong>מסלול מורחב</strong>
            <span>
              כולל יותר שאלות עומק על הרגלי משחק, קהילה, כנסים, חנויות, יצירה, עבודה וצרכים עתידיים.
              מתאים למי שרוצה לעזור לבנות תמונה מלאה יותר.
              במסלול זה יופיעו בערך {{ full_count }} חלקים.
            </span>
          </label>
        </div>
      </div>

      <button type="submit" class="btn btn-primary">בחירת מסלול והמשך</button>
    </form>
  </section>
</main>
{% endblock %}
