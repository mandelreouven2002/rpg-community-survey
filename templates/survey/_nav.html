{% macro section_nav(active, current, session, SECTION_LABELS) %}
{% set total = active|length %}
{% set current_idx = active.index(current) if current in active else 0 %}
{% set percent = ((current_idx) / total * 100)|round %}
<div class="top-bar">
    <button type="button" class="back-btn" onclick="window.history.back()">➔ חזור</button>
    <div class="progress-container"><div class="progress-bar" style="width: {{ percent }}%"></div></div>
    <div class="step-text">שלב {{ current_idx + 1 }} מתוך {{ total }}</div>
</div>
{% endmacro %}
